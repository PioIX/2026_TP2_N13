<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Contacto | Pilares Gastronómicos</title>

    <!-- GOOGLE FONTS -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="styles/styles-contacto.css">
</head>

<body>

    <!-- HEADER -->
    <header>

        <div class="logo">
            <h1>Pilares Gastronómicos</h1>
        </div>

        <nav>
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="productos.html">Servicios</a></li>
                <li><a href="resenas.html">Reseñas</a></li>
                <li><a href="contacto.html">Contacto</a></li>
            </ul>
        </nav>

    </header>

    <!-- MAIN -->
    <main>

        <section class="contacto">

            <h2>Contacto</h2>

            <p>
                ¿Querés recibir más información sobre nuestros servicios?
                Completá el formulario y nos comunicaremos con vos.
            </p>

            <!-- FORMULARIO -->
            <form action="https://formspree.io/f/TU_ID" method="POST">

                <div class="campo">

                    <label for="nombre">Nombre</label>

                    <input type="text"
                        id="nombre"
                        name="nombre"
                        required>

                </div>

                <div class="campo">

                    <label for="email">Correo Electrónico</label>

                    <input type="email"
                        id="email"
                        name="email"
                        required>

                </div>

                <div class="campo">

                    <label for="mensaje">Mensaje</label>

                    <textarea id="mensaje"
                        name="mensaje"
                        rows="6"
                        required></textarea>

                </div>

                <button type="submit">
                    Enviar Mensaje
                </button>

            </form>

        </section>

    </main>

    <!-- FOOTER -->
    <footer>

        <p>
            © 2026 Pilares Gastronómicos - Todos los derechos reservados
        </p>

    </footer>

</body>

</html>
